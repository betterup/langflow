apiVersion: v1
kind: Secret
metadata:
  name: {{ include "langflow.fullname" . }}-secrets
  labels:
    {{- include "langflow.labels" . | nindent 4 }}
type: Opaque
data:
  database-url: {{ printf "postgresql://langflow_user:$(DATABASE_PASSWORD)@%s:%d/%s?sslmode=%s" .Values.database.host (.Values.database.port | int) .Values.database.name .Values.database.sslMode | b64enc }}